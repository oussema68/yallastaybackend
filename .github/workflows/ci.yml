name: Backend CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DJANGO_ENV: dev
  # Required by settings; value is only for CI (never use in production).
  SECRET_KEY: ci-insecure-secret-key-for-github-actions-only

jobs:
  lint:
    name: Lint (Black + Ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yallastay
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r ../requirements.txt

      - name: Ensure secrets are not tracked
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "::error::.env must not be committed"
            exit 1
          fi

      - name: Black (format check)
        run: black --check .

      - name: Ruff (lint)
        run: ruff check .

  django-checks:
    name: Django checks
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: yallastay
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r ../requirements.txt

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Django system check
        run: python manage.py check

  test:
    name: Tests + coverage
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: yallastay
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r ../requirements.txt

      - name: Run tests with coverage
        run: coverage run manage.py test --verbosity 1

      - name: Coverage report
        run: coverage report

      - name: Coverage XML
        run: coverage xml

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            yallastay/coverage.xml
            yallastay/htmlcov/
          if-no-files-found: warn

  # When repo variable SMOKE_API_BASE is set (e.g. https://api-xxxx.up.railway.app), hits live public endpoints.
  smoke-deployed-api:
    name: Smoke (deployed API)
    needs: [django-checks, test]
    if: ${{ vars.SMOKE_API_BASE != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: GET /api/areas/ and /api/universities/
        env:
          BASE: ${{ vars.SMOKE_API_BASE }}
        run: |
          set -eux
          B="${BASE%/}"
          curl -fsS "$B/api/areas/" >/dev/null
          curl -fsS "$B/api/universities/" >/dev/null
