# Repo root config when Railway service root is ``yallastay_backend`` (not ``yallastay/``).
# Django lives in ``yallastay/`` (manage.py). See also ``yallastay/railway.toml`` if root dir is ``yallastay``.

[build]
builder = "nixpacks"

[deploy]
releaseCommand = "cd yallastay && python manage.py migrate --noinput && python manage.py collectstatic --noinput"
