# Tooling for Django package in yallastay/ (CI runs from that folder).

[tool.ruff]
target-version = "py312"
line-length = 88
exclude = ["venv", ".venv", "__pycache__", "*.egg-info", ".git", ".ruff_cache"]

[tool.ruff.lint.per-file-ignores]
# Django settings use "from X import *" - star imports are intentional
"yallastay/settings/*.py" = ["F403", "F405"]
"yallastay/settings/__init__.py" = ["F403"]

[tool.black]
line-length = 88
target-version = ["py312"]
exclude = "/(venv|\\.venv|__pycache__|\\.git|\\.ruff_cache)/"

[tool.coverage.run]
source = ["."]
branch = true
omit = [
    "*/migrations/*",
    "*/tests/*",
    "manage.py",
    "*/settings/*",
    "*/wsgi.py",
    "*/asgi.py",
]

[tool.coverage.report]
fail_under = 80
show_missing = true
skip_empty = true

[tool.coverage.xml]
output = "coverage.xml"
