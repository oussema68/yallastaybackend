# Tooling for Django package in yallastay/ (CI runs from that folder).

[tool.black]
line-length = 88
target-version = ["py312"]
extend-exclude = "/(venv|\\.venv|\\.ruff_cache)/"

[tool.ruff]
line-length = 88
target-version = "py312"
extend-exclude = ["venv", ".venv", ".ruff_cache"]

[tool.coverage.run]
source = ["."]
branch = true
omit = [
    "*/migrations/*",
    "*/tests/*",
    "manage.py",
    "*/settings/*",
    "*/wsgi.py",
    "*/asgi.py",
]

[tool.coverage.report]
fail_under = 80
show_missing = true
skip_empty = true

[tool.coverage.xml]
output = "coverage.xml"
