# Railway: service root = this folder (manage.py). Start process = Procfile ``web``.
# Release runs before new containers serve traffic (migrate + static).
# Builder: Railway default (Railpack). Do not pin nixpacks here.
# https://docs.railway.com/reference/config-as-code

[deploy]
releaseCommand = "python manage.py migrate --noinput && python manage.py migrate --check && python manage.py collectstatic --noinput"
